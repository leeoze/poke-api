# =============================================================================
# .github/workflows/ci-cd.yml
#
# PIPELINE CI/CD — PokéAPI
#
# -----------------------------------------------------------------------------
# O que é CI?
# -----------------------------------------------------------------------------
# Continuous Integration (Integração Contínua)
#
# Sempre que um desenvolvedor realiza:
#
#   git push
#
# o GitHub Actions executa automaticamente:
#
#   • Instalação das dependências
#   • Execução dos testes
#   • Análise de cobertura
#   • Verificações de qualidade
#
# Objetivo:
# Detectar problemas antes do deploy.
#
# -----------------------------------------------------------------------------
# O que é CD?
# -----------------------------------------------------------------------------
# Continuous Deployment (Deploy Contínuo)
#
# Após o CI passar com sucesso:
#
#   • O Render recebe um webhook
#   • O deploy é iniciado automaticamente
#   • A nova versão entra em produção
#
# Objetivo:
# Eliminar deploys manuais.
#
# -----------------------------------------------------------------------------
# Fluxo completo
# -----------------------------------------------------------------------------
#
# Push → GitHub Actions
#          ↓
#      Instala Poetry
#          ↓
#   Instala Dependências
#          ↓
#      Executa Testes
#          ↓
#    Gera Cobertura XML
#          ↓
#      Upload Artefato
#          ↓
#     Deploy no Render
#
# -----------------------------------------------------------------------------
# Secrets necessários
# -----------------------------------------------------------------------------
#
# GitHub
# → Settings
# → Secrets and Variables
# → Actions
#
# Adicionar:
#
# RENDER_DEPLOY_HOOK_URL
#
# Exemplo:
#
# https://api.render.com/deploy/srv-xxxxxxxxxxxxxxxx?key=xxxxxxxx
#
# =============================================================================

name: "🧪 CI / 🚀 CD — PokéAPI"

# =============================================================================
# EVENTOS QUE DISPARAM O PIPELINE
# =============================================================================

on:

  # Executa em push para estas branches
  push:
    branches:
      - main
      - develop

  # Executa ao abrir ou atualizar PR para main
  pull_request:
    branches:
      - main

# =============================================================================
# JOB 1 — CONTINUOUS INTEGRATION
# =============================================================================

jobs:

  ci:

    name: "🧪 Testes & Qualidade"

    runs-on: ubuntu-latest

    steps:

      # -----------------------------------------------------------------------
      # Baixa o código do repositório
      # -----------------------------------------------------------------------

      - name: "📥 Checkout do código"
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Instala Python
      # -----------------------------------------------------------------------

      - name: "🐍 Configurar Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------------------------------------
      # Instala Poetry
      # -----------------------------------------------------------------------

      - name: "📦 Instalar Poetry"
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"
          virtualenvs-create: true
          virtualenvs-in-project: true

      # -----------------------------------------------------------------------
      # Cache da Virtual Environment
      #
      # Evita reinstalar todas as dependências a cada execução.
      # Acelera significativamente o CI.
      # -----------------------------------------------------------------------

      - name: "⚡ Cache Poetry"
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      # -----------------------------------------------------------------------
      # Instala dependências
      #
      # Inclui:
      # - Dependências da aplicação
      # - Dependências de desenvolvimento
      # - Ferramentas de teste
      # -----------------------------------------------------------------------

      - name: "📚 Instalar dependências"
        run: poetry install --with dev

      # -----------------------------------------------------------------------
      # Exibe versões instaladas
      #
      # Facilita troubleshooting em caso de falhas.
      # -----------------------------------------------------------------------

      - name: "🔎 Verificar ambiente"
        run: |
          python --version
          poetry --version

      # -----------------------------------------------------------------------
      # Executa os testes
      #
      # Cobertura atual do projeto:
      # ~58%
      #
      # O limite foi configurado em 55% para evitar falhas
      # enquanto novos testes são implementados.
      #
      # Futuramente recomenda-se elevar para:
      #
      # 70%
      # 80%
      # 90%
      #
      # -----------------------------------------------------------------------

      - name: "🧪 Executar testes"
        run: |
          poetry run pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=55 \
            -v

      # -----------------------------------------------------------------------
      # Upload do relatório de cobertura
      #
      # Permite baixar coverage.xml diretamente da aba Actions.
      # -----------------------------------------------------------------------

      - name: "📊 Upload do relatório de cobertura"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      # -----------------------------------------------------------------------
      # Resumo do CI
      #
      # Aparece na interface do GitHub Actions.
      # -----------------------------------------------------------------------

      - name: "📝 Resumo da execução"
        if: always()
        run: |
          echo "## Resultado do CI 🧪" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Python 3.11" >> $GITHUB_STEP_SUMMARY
          echo "- Poetry 1.8.3" >> $GITHUB_STEP_SUMMARY
          echo "- Testes executados com Pytest" >> $GITHUB_STEP_SUMMARY
          echo "- Cobertura mínima exigida: 55%" >> $GITHUB_STEP_SUMMARY
          echo "- Artefato coverage.xml disponível para download" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# JOB 2 — CONTINUOUS DEPLOYMENT
# =============================================================================

  cd:

    name: "🚀 Deploy no Render"

    runs-on: ubuntu-latest

    # Executa apenas após CI bem sucedido
    needs: ci

    # Deploy somente:
    # - branch main
    # - evento push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:

      # -----------------------------------------------------------------------
      # Dispara o Deploy Hook do Render
      # -----------------------------------------------------------------------

      - name: "🚀 Acionar Deploy"
        run: |
          curl \
            --silent \
            --show-error \
            --fail \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      # -----------------------------------------------------------------------
      # Resumo do deploy
      # -----------------------------------------------------------------------

      - name: "📢 Resumo do Deploy"
        run: |
          echo "## Deploy realizado com sucesso 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: main" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Ambiente: Render.com" >> $GITHUB_STEP_SUMMARY
          echo "- Aplicação: PokéAPI" >> $GITHUB_STEP_SUMMARY
