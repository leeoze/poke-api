# =============================================================================
# .github/workflows/ci-cd.yml — Pipeline de CI/CD com GitHub Actions
#
# O que é CI/CD?
#   CI (Continuous Integration) = Integração Contínua
#     Toda vez que código novo é enviado, roda testes automaticamente.
#     Objetivo: detectar bugs cedo, antes de chegar em produção.
#
#   CD (Continuous Deployment) = Deploy Contínuo
#     Se os testes passarem na branch principal, faz deploy automático.
#     Objetivo: sem deploy manual — o código vai para produção sozinho.
#
# Fluxo deste pipeline:
#   1. Developer faz push → GitHub detecta
#   2. Job CI inicia:
#      a. Instala dependências com Poetry
#      b. Roda os testes com pytest
#      c. Verifica cobertura mínima de 80%
#   3. Se CI passou e está na branch main:
#      a. Job CD dispara o deploy no Render.com via webhook
#
# Configuração necessária:
#   No GitHub → Settings → Secrets → Actions:
#   RENDER_DEPLOY_HOOK_URL = URL do deploy hook do Render.com
# =============================================================================

name: "🧪 CI / 🚀 CD — PokéAPI"

# Define quando este workflow é executado
on:
  push:
    branches: [main, develop]   # em qualquer push nestas branches
  pull_request:
    branches: [main]            # em PRs direcionados à main

jobs:

  # ===========================================================================
  # JOB CI — Testes e verificação de qualidade
  # ===========================================================================
  ci:
    name: "🧪 Testes & Cobertura"
    runs-on: ubuntu-latest   # roda numa máquina virtual Ubuntu do GitHub

    steps:
      # Passo 1: Baixa o código do repositório
      - name: "📥 Checkout do repositório"
        uses: actions/checkout@v4

      # Passo 2: Instala Python 3.11
      - name: "🐍 Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Passo 3: Instala o Poetry
      - name: "📦 Instalar Poetry"
        uses: snok/install-poetry@v1
        with:
          version:              "1.8.3"
          virtualenvs-create:   true
          virtualenvs-in-project: true  # cria .venv dentro do projeto

      # Passo 4: Cache das dependências — evita reinstalar a cada run
      # O cache é invalidado se pyproject.toml ou poetry.lock mudar
      - name: "⚡ Cache de dependências Poetry"
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      # Passo 5: Instala todas as dependências (incluindo dev para testes)
      - name: "📦 Instalar dependências"
        run: poetry install --with dev

      # Passo 6: Roda os testes com relatório de cobertura
      - name: "🧪 Executar testes com cobertura"
        run: |
          poetry run pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      # Passo 7: Salva o relatório de cobertura como artefato
      # Disponível para download na aba Actions do GitHub
      - name: "📊 Upload do relatório de cobertura"
        uses: actions/upload-artifact@v4
        if: always()   # salva mesmo se os testes falharem
        with:
          name: coverage-report
          path: coverage.xml

  # ===========================================================================
  # JOB CD — Deploy automático (só roda se CI passou)
  # ===========================================================================
  cd:
    name: "🚀 Deploy → Render.com"
    runs-on: ubuntu-latest
    needs: ci   # aguarda o job CI completar com sucesso

    # Condição: só deploya se for push na main (não em PRs ou outras branches)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: "🚀 Disparar deploy no Render.com"
        run: |
          # Chama o webhook do Render.com que aciona o deploy
          # O Render puxa o código do GitHub e faz o build automaticamente
          curl --silent --show-error --fail \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Deploy disparado com sucesso para o commit ${{ github.sha }}"

      - name: "📢 Resumo do deploy"
        run: |
          echo "## Deploy Concluído 🎉" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Ambiente:** Render.com" >> $GITHUB_STEP_SUMMARY
