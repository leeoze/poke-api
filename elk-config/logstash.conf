# =============================================================================
# elk-config/logstash.conf — Pipeline de processamento de logs
#
# O que é o Logstash?
#   É o "L" do ELK Stack. Funciona como um pipeline:
#
#   [Aplicação FastAPI]
#        ↓ envia JSON via TCP/UDP na porta 5044
#   [Logstash — este arquivo]
#        ↓ processa, enriquece e filtra
#   [Elasticsearch]
#        ↓ indexa os logs
#   [Kibana]
#        ↓ visualiza em dashboards
#
# Estrutura do arquivo:
#   input  → define DE ONDE os logs chegam
#   filter → transforma e enriquece os dados
#   output → define PARA ONDE os logs processados são enviados
# =============================================================================

# =============================================================================
# INPUT — Como recebemos os logs
# =============================================================================
input {
  # Aceita logs via TCP (conexão persistente — mais confiável)
  tcp {
    port  => 5044
    codec => json_lines  # cada linha é um JSON completo
  }

  # Aceita logs via UDP (mais rápido, sem garantia de entrega)
  udp {
    port  => 5044
    codec => json_lines
  }
}

# =============================================================================
# FILTER — Processa e enriquece os logs recebidos
# =============================================================================
filter {

  # ── Normaliza o timestamp ────────────────────────────────────────────────
  # O campo "timestamp" do nosso JSON vira o @timestamp do Elasticsearch
  if [timestamp] {
    date {
      match        => ["timestamp", "yyyy-MM-dd'T'HH:mm:ss"]
      target       => "@timestamp"
      remove_field => ["timestamp"]  # remove o campo original para não duplicar
    }
  }

  # ── Adiciona metadados de contexto ──────────────────────────────────────
  # Esses campos aparecem em todos os documentos no Elasticsearch
  mutate {
    add_field => {
      "application" => "poke-api"
      "environment" => "${APP_ENV:production}"
    }
  }

  # ── Classifica requisições lentas ───────────────────────────────────────
  # Requisições acima de 500ms recebem uma tag especial
  # Você pode criar alertas no Kibana para este padrão
  if [duration_ms] and [duration_ms] > 500 {
    mutate {
      add_tag => ["slow_request"]
    }
  }

  # ── Classifica erros HTTP ────────────────────────────────────────────────
  if [status_code] and [status_code] >= 400 {
    mutate {
      add_tag => ["http_error"]
    }
  }

  # ── Classifica erros críticos ────────────────────────────────────────────
  if [level] == "ERROR" or [level] == "CRITICAL" {
    mutate {
      add_tag => ["app_error"]
    }
  }
}

# =============================================================================
# OUTPUT — Para onde enviamos os logs processados
# =============================================================================
output {

  # ── Elasticsearch ────────────────────────────────────────────────────────
  elasticsearch {
    hosts  => ["elasticsearch:9200"]

    # Índice separado por dia — facilita política de retenção
    # ex: poke-api-logs-2024.01.15
    index  => "poke-api-logs-%{+YYYY.MM.dd}"

    action => "index"
  }

  # ── Stdout (debug) ───────────────────────────────────────────────────────
  # Em desenvolvimento, imprime no console do container Logstash
  # Remova ou comente em produção para economizar recursos
  stdout {
    codec => rubydebug
  }
}
