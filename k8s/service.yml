# =============================================================================
# k8s/service.yml — Service e Ingress do Kubernetes
#
# O que é um Service?
#   Os Pods têm IPs que mudam quando reiniciam.
#   O Service cria um endereço estável para acessar um conjunto de Pods.
#   É como um "load balancer interno" do K8s.
#
#   Tipos de Service:
#   • ClusterIP  → acesso apenas dentro do cluster (padrão)
#   • NodePort   → expõe numa porta do nó (para dev/teste)
#   • LoadBalancer → cria load balancer na nuvem (AWS ELB, GCP GLB, etc.)
#
# O que é um Ingress?
#   Recebe tráfego EXTERNO (HTTP/HTTPS) e roteia para os Services internos.
#   Funciona como um proxy reverso — similar ao Nginx/Traefik.
#   Requer um Ingress Controller instalado no cluster.
# =============================================================================

# =============================================================================
# Service — expõe os Pods da API dentro do cluster
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: poke-api-service
  namespace: default
  labels:
    app: poke-api
spec:
  # ClusterIP → acessível apenas dentro do cluster Kubernetes
  # Outros pods chamam: http://poke-api-service:80
  type: ClusterIP

  # Seleciona os Pods com label app=poke-api para receber tráfego
  selector:
    app: poke-api

  ports:
    - name:       http
      protocol:   TCP
      port:       80          # porta que outros serviços usam para chamar
      targetPort: 8000        # porta que o container escuta

---
# =============================================================================
# HorizontalPodAutoscaler — escala automaticamente baseado na carga
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: poke-api-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       poke-api

  # Mantém entre 2 e 10 réplicas
  minReplicas: 2
  maxReplicas: 10

  metrics:
    # Escala quando CPU ultrapassar 70% da média entre os pods
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 70

    # Escala quando memória ultrapassar 80%
    - type: Resource
      resource:
        name: memory
        target:
          type:               Utilization
          averageUtilization: 80

---
# =============================================================================
# Ingress — expõe a API para fora do cluster (tráfego externo)
# Requer: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/...
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: poke-api-ingress
  namespace: default
  annotations:
    # Usa o nginx como controller de ingress
    kubernetes.io/ingress.class: "nginx"

    # Redireciona HTTP → HTTPS automaticamente
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # Limita tamanho do body (evita uploads gigantes)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    # Timeouts de conexão
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout:    "60"

    # Habilita rate limiting — máximo 100 requests/segundo por IP
    nginx.ingress.kubernetes.io/limit-rps: "100"

spec:
  ingressClassName: nginx

  rules:
    # ← substitua pelo seu domínio
    - host: poke-api.seudominio.com
      http:
        paths:
          - path:     /
            pathType: Prefix
            backend:
              service:
                name: poke-api-service
                port:
                  number: 80

  # Configuração TLS (HTTPS) — use cert-manager para automatizar certificados
  # tls:
  #   - hosts:
  #       - poke-api.seudominio.com
  #     secretName: poke-api-tls
